#:schema https://json.schemastore.org/any.json

root = "."
tmp_dir = "tmp"
testdata_dir = "testdata"

[build]
  cmd = "go build -o ./tmp/shortener ./cmd/shortener"
  entrypoint = ["./tmp/shortener"]

  delay = 500
  kill_delay = "500ms"

  include_ext = ["go", "html", "tmpl", "tpl"]
  include_dir = ["cmd", "internal"]
  exclude_dir = ["tmp", "bin", "vendor", "testdata"]
  exclude_regex = ["_test.go"]

  log = "build-errors.log"
  stop_on_error = true

  send_interrupt = true
  rerun = false
  follow_symlink = false
  exclude_unchanged = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = true

[misc]
  clean_on_exit = true

[proxy]
  enabled = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true